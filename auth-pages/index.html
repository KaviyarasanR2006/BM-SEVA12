<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BM-SEVA Home</title>
  <style>
    /* General Reset and Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: url('A_login_screen_interface_superimposed_on_an_enviro.png') no-repeat center center fixed;
      background-size: cover;
      color: #333;
      min-height: 100vh;
    }

    /* Navigation Bar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      flex-wrap: wrap;
    }

    .navbar img { 
      height: 40px;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      transition: text-decoration 0.3s;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    /* Main Container */
    .home-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 60px); /* leave space for navbar */
      padding: 20px;
    }

    .home-box {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 8px;
      padding: 30px 20px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .home-box h2 {
      margin-bottom: 20px;
      color: #4CAF50;
      font-size: 1.5rem;
    }

    .home-box button {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .home-box button:hover {
      background-color: #45a049;
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        flex-direction: column;
        width: 100%;
        padding-top: 10px;
      }

      .home-box {
        padding: 20px 15px;
      }

      .home-box h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <img src="../BM-SEVA LOGO 3.PNG" alt="BM-SEVA Logo" />
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="">login</a>
      <a href="">Request Status</a>
      <a href="#">Contact Us</a>
    </nav>
  </header>

  <main class="home-container">
    <section class="home-box">
      <h2>Welcome to BM-SEVA</h2>
      <button onclick="location.href='guiude.html'">Get Started</button>
    </section>
  </main>
</body>
</html>
