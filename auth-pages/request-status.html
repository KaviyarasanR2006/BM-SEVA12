<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 80%;
        }

        .header {
            background-color: #2e7d32;
            color: white;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .progress-container {
            width: 100%;
            margin: 30px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            width: 80%;
        }

        .progress-step {
            text-align: center;
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-line {
            width: 100%;
            height: 5px;
            background: #4caf50;
            position: absolute;
            top: 12px;
            left: 0;
            z-index: 0;
        }

        .progress-circle {
            width: 30px;
            height: 30px;
            background: white;
            border: 5px solid #4caf50;
            border-radius: 50%;
            margin: auto;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        .progress-step.completed .progress-circle {
            background: #4caf50;
        }

        .progress-step span {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }

        .status-container {
            text-align: center;
            width: 100%;
        }

        .status-date {
            margin-top: 30px;
            font-size: 16px;
            color: #555;
        }

        .action-buttons {
            margin-top: 20px;
        }

        .action-buttons button {
            padding: 10px 20px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .action-buttons button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Request Status</h1>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-step completed">
                    <div class="progress-circle">✓</div>
                    <span>Request Placed</span>
                </div>

                <div class="progress-step completed">
                    <div class="progress-circle">✓</div>
                    <span>In Review</span>
                </div>

                <div class="progress-step">
                    <div class="progress-circle"></div>
                    <span>Scheduled</span>
                </div>

                <div class="progress-step">
                    <div class="progress-circle"></div>
                    <span>Completed</span>
                </div>

                <div class="progress-line"></div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-date">
                Request Date: 2025-04-20
            </div>

            <div class="action-buttons">
                <button>View Details</button>
                <button>Contact Support</button>
            </div>
        </div>
    </div>

</body>
</html>
